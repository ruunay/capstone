spring.application.name=capstone

spring.datasource.url=jdbc:mysql://localhost:3306/capstone_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=PASSWORD123!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

jwt.secret=held_super_secret_key_that_is_long_enough_for_hs256_algorithm
jwt.expiration=86400000

logging.level.org.springframework.security=DEBUG

server.port=8080
