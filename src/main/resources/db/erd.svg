<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Capstone Database ERD</title>
  <desc id="desc">Entity relationship diagram for users, journal_entries, prompts, and entry_responses.</desc>
  <defs>
    <style>
      .bg { fill: #f7f5ef; }
      .card { fill: #fffdf8; stroke: #2f3b2f; stroke-width: 2; rx: 18; ry: 18; }
      .header { fill: #dbe7c9; stroke: #2f3b2f; stroke-width: 2; }
      .title { font: 700 26px "Segoe UI", Arial, sans-serif; fill: #1f2a1f; }
      .field { font: 16px "Consolas", "Courier New", monospace; fill: #243224; }
      .label { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #1f2a1f; }
      .line { stroke: #506350; stroke-width: 3; fill: none; }
      .crow { stroke: #506350; stroke-width: 3; fill: none; }
      .note { font: 15px "Segoe UI", Arial, sans-serif; fill: #445544; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900"/>
  <text x="700" y="60" text-anchor="middle" class="title">Capstone Database ERD</text>

  <g transform="translate(100 140)">
    <rect class="card" x="0" y="0" width="320" height="220"/>
    <rect class="header" x="0" y="0" width="320" height="52"/>
    <text x="160" y="33" text-anchor="middle" class="label">users</text>
    <text x="20" y="84" class="field">id BIGINT PK</text>
    <text x="20" y="114" class="field">username VARCHAR(50) UK</text>
    <text x="20" y="144" class="field">email VARCHAR(100) UK</text>
    <text x="20" y="174" class="field">password VARCHAR(255)</text>
    <text x="20" y="204" class="field">role VARCHAR(20)</text>
    <text x="20" y="234" class="field">created_at TIMESTAMP</text>
  </g>

  <g transform="translate(520 140)">
    <rect class="card" x="0" y="0" width="360" height="250"/>
    <rect class="header" x="0" y="0" width="360" height="52"/>
    <text x="180" y="33" text-anchor="middle" class="label">journal_entries</text>
    <text x="20" y="84" class="field">id BIGINT PK</text>
    <text x="20" y="114" class="field">title VARCHAR(100)</text>
    <text x="20" y="144" class="field">content TEXT</text>
    <text x="20" y="174" class="field">mood_type VARCHAR(50)</text>
    <text x="20" y="204" class="field">mood_intensity INT</text>
    <text x="20" y="234" class="field">created_at TIMESTAMP</text>
    <text x="20" y="264" class="field">user_id BIGINT FK</text>
  </g>

  <g transform="translate(980 120)">
    <rect class="card" x="0" y="0" width="280" height="160"/>
    <rect class="header" x="0" y="0" width="280" height="52"/>
    <text x="140" y="33" text-anchor="middle" class="label">prompts</text>
    <text x="20" y="84" class="field">id BIGINT PK</text>
    <text x="20" y="114" class="field">question TEXT</text>
    <text x="20" y="144" class="field">created_at TIMESTAMP</text>
  </g>

  <g transform="translate(700 520)">
    <rect class="card" x="0" y="0" width="360" height="220"/>
    <rect class="header" x="0" y="0" width="360" height="52"/>
    <text x="180" y="33" text-anchor="middle" class="label">entry_responses</text>
    <text x="20" y="84" class="field">id BIGINT PK</text>
    <text x="20" y="114" class="field">response_text TEXT</text>
    <text x="20" y="144" class="field">entry_id BIGINT FK</text>
    <text x="20" y="174" class="field">prompt_id BIGINT FK</text>
    <text x="20" y="204" class="field">created_at TIMESTAMP</text>
  </g>

  <path class="line" d="M420 250 H520"/>
  <path class="crow" d="M520 250 l-18 -12 M520 250 l-18 0 M520 250 l-18 12"/>
  <path class="line" d="M420 238 v24"/>
  <path class="line" d="M438 238 v24"/>
  <text x="458" y="228" class="note">1 to many</text>

  <path class="line" d="M700 390 V520"/>
  <path class="crow" d="M700 520 l-12 -18 M700 520 l0 -18 M700 520 l12 -18"/>
  <path class="line" d="M688 390 h24"/>
  <path class="line" d="M688 408 h24"/>
  <text x="720" y="470" class="note">1 to many</text>

  <path class="line" d="M1060 280 V520"/>
  <path class="crow" d="M1060 520 l-12 -18 M1060 520 l0 -18 M1060 520 l12 -18"/>
  <path class="line" d="M1048 280 h24"/>
  <path class="line" d="M1048 298 h24"/>
  <text x="1080" y="420" class="note">1 to many</text>

  <text x="120" y="820" class="note">FK mappings: journal_entries.user_id -&gt; users.id, entry_responses.entry_id -&gt; journal_entries.id, entry_responses.prompt_id -&gt; prompts.id</text>
</svg>
